name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    # arm64 runner with Xcode 16 (Swift 6); the SDK is universal so both slices build.
    runs-on: macos-15
    steps:
      # Resolve first so checkout can pin to the tag: a workflow_dispatch for
      # v0.1.0 must build the v0.1.0 source, not whatever HEAD happens to be.
      # env (not inline ${{ }} in run:) keeps the input out of shell parsing.
      - name: Resolve version
        id: v
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.v.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Show toolchain
        run: swift --version && pnpm --version

      - name: Build release tarball
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: ./scripts/build-release.sh "$VERSION"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.version }}
          files: |
            dist/kitterm-${{ steps.v.outputs.version }}-macos-universal.tar.gz
            dist/kitterm-${{ steps.v.outputs.version }}-macos-universal.tar.gz.sha256
          body: |
            ## Install

            ```sh
            curl -fsSL https://kitterm.dev/install.sh | sh
            ```

            Then `kitterm start`.

            Builds are unsigned: the installer clears the quarantine attribute
            for you. If you extract the tarball by hand instead, run
            `xattr -dr com.apple.quarantine <prefix>` before first launch.
